<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <!-- Viewport instellingen cruciaal voor mobiel / GSM / iPad -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>De Bende - 16-Bit Survival</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background-color: #111;
            font-family: 'VT323', monospace;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh; 
            overflow: hidden;
        }

        /* --- RESPONSIVE GAME CONTAINER --- */
        #game-screen {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            position: relative;
            overflow: hidden;
            background-color: #000;
            display: flex;
            flex-direction: column;
        }

        /* Schudden van het scherm voor jumpscares */
        #game-screen.shake {
            animation: screen-shake 0.15s infinite;
        }

        @keyframes screen-shake {
            0% { transform: translate(3px, 3px) rotate(0deg); }
            20% { transform: translate(-3px, -2px) rotate(-1deg); }
            40% { transform: translate(-1px, -1px) rotate(1deg); }
            60% { transform: translate(2px, 1px) rotate(0deg); }
            80% { transform: translate(-1px, -3px) rotate(-1deg); }
            100% { transform: translate(2px, -1px) rotate(1deg); }
        }

        /* Voor iPad en Desktop: Maak er een mooi kader van in het midden */
        @media (min-width: 768px) {
            #game-screen {
                width: 95vw;
                height: 85vh;
                max-width: 1024px;
                max-height: 768px;
                border: 4px solid #555;
                border-radius: 8px;
                box-shadow: 0 0 30px rgba(0,0,0,0.8);
            }
        }

        /* --- VISUELE SCÈNES --- */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            pointer-events: none;
            background-size: cover;
            background-position: center;
        }

        .scene.active {
            opacity: 1;
        }

        #scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
            opacity: 0.7;
        }

        /* --- JUMPSCARE OVERLAY --- */
        #jumpscare-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ff0000;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #jumpscare-overlay.active {
            display: flex;
            animation: flash-red-black 0.05s infinite alternate;
        }

        @keyframes flash-red-black {
            0% { background-color: #ff0000; }
            100% { background-color: #000000; }
        }

        .jumpscare-monster {
            width: 90%;
            height: 90%;
            max-width: 500px;
            animation: monster-pulsate 0.1s infinite alternate;
        }

        @keyframes monster-pulsate {
            0% { transform: scale(0.9); }
            100% { transform: scale(1.15); }
        }

        /* --- UI LAGEN --- */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* Setup / Upload Scherm */
        #setup-layer {
            align-items: center;
            justify-content: center;
            background-color: #111;
            z-index: 50;
            gap: 20px;
            padding: 20px;
            text-align: center;
        }

        .setup-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: #64b5f6;
            text-shadow: 2px 2px 0px #000;
        }

        input[type="file"] { display: none; }
        
        .upload-label {
            background: linear-gradient(to bottom, #4caf50, #2e7d32);
            border: 4px solid #fff;
            padding: clamp(10px, 3vw, 15px) clamp(20px, 5vw, 30px);
            font-size: clamp(1.5rem, 5vw, 2rem);
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.6);
            display: inline-block;
        }
        .upload-label:active { transform: translate(4px, 4px); box-shadow: none; }

        /* Menu Scherm */
        #menu-layer {
            align-items: center;
            justify-content: space-between;
            padding: clamp(30px, 8vh, 50px) 20px;
            display: none;
        }

        .game-title {
            font-size: clamp(4rem, 15vw, 7rem);
            text-align: center;
            background: linear-gradient(to bottom, #ffffaa, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 4px 4px 0px #880000;
            letter-spacing: 4px;
            margin-top: 10px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            pointer-events: auto;
            width: 100%;
            max-width: 400px;
        }

        .press-start {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: #fff;
            text-shadow: 2px 2px 0px #000;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.8);
            border: 4px solid #fff;
            padding: 10px 20px;
            border-radius: 8px;
            transition: transform 0.1s, background 0.2s;
            width: 100%;
            text-align: center;
        }
        
        .press-start:hover {
            background: rgba(50, 50, 50, 0.9);
            transform: scale(1.02);
        }

        .credits {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: #fff;
            pointer-events: none;
            text-shadow: 2px 2px 0px #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
        }

        /* --- POKÉMON STIJL CUTSCENES --- */
        #cutscene-layer {
            display: none;
            justify-content: flex-end;
            padding: clamp(10px, 3vw, 20px);
            z-index: 25;
            background: rgba(0,0,0,0.5); 
            pointer-events: auto; 
        }

        .cutscene-box {
            background: linear-gradient(to bottom, #eeeeee, #cccccc);
            border: 4px solid #444;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            gap: 15px;
            box-shadow: inset 0 0 0 2px #fff, 4px 4px 0px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            min-height: 110px;
            height: auto;
            max-height: 140px;
            position: relative;
        }

        .portrait-container {
            width: clamp(65px, 18vw, 85px);
            height: clamp(65px, 18vw, 85px);
            background: #fff;
            border: 3px solid #444;
            border-radius: 8px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .dialog-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .speaker-name {
            font-size: clamp(1.4rem, 4.5vw, 1.8rem);
            color: #d32f2f;
            text-shadow: 1px 1px 0px #fff;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .speaker-text {
            font-size: clamp(1.1rem, 3.8vw, 1.4rem);
            color: #222;
            line-height: 1.15;
        }

        .next-indicator {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 1.3rem;
            color: #d32f2f;
            animation: bounce-down 0.5s infinite alternate;
        }

        @keyframes bounce-down {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* --- SNES UI STIJL VOOR GAMEPLAY --- */
        #game-layer {
            display: none;
            flex-direction: column;
            justify-content: flex-end;
            padding: clamp(10px, 3vw, 15px);
            padding-bottom: clamp(15px, 5vh, 25px); 
        }

        #top-ui {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 30;
        }

        #signpost {
            background: linear-gradient(to bottom, #a06b3f, #694220);
            border: 3px solid #3e2723;
            border-radius: 4px;
            color: #fff;
            padding: 8px 12px;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            text-shadow: 2px 2px 0px #000;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.5);
        }

        #audio-toggle {
            background: linear-gradient(to bottom, #3b5998, #1e2b4d);
            border: 2px solid #fff;
            border-radius: 4px;
            color: #fff;
            padding: 8px 12px;
            font-family: 'VT323', monospace;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 2px 2px 0px #000;
        }

        /* BOVENAAN: GAME OVER TEKST */
        #gameover-title {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            font-size: clamp(4rem, 15vw, 7rem);
            color: #ff5252;
            text-shadow: 4px 4px 0px #000;
            animation: bounce 2s infinite;
            display: none;
            z-index: 25;
            pointer-events: none;
        }

        #dialog-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .dialog-box {
            background: linear-gradient(to bottom, rgba(26, 42, 108, 0.9), rgba(17, 34, 64, 0.9));
            border: 3px solid #fff;
            border-radius: 6px;
            padding: 10px 15px;
            font-size: clamp(1.1rem, 4.2vw, 1.3rem);
            line-height: 1.25;
            margin-bottom: 8px;
            box-shadow: inset 0 0 10px #000, 4px 4px 0px rgba(0,0,0,0.6);
            min-height: 60px;
            pointer-events: auto;
            text-shadow: 1px 1px 0px #000;
        }

        .choices-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            pointer-events: auto;
            flex-wrap: wrap; 
        }

        .action-btn {
            background: linear-gradient(to bottom, #4a4a4a, #2b2b2b);
            border: 3px solid #fff;
            border-radius: 6px;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: clamp(1.1rem, 3.8vw, 1.3rem);
            padding: 10px 12px;
            cursor: pointer;
            flex: 1 1 45%; 
            min-width: 130px; 
            box-shadow: 3px 3px 0px rgba(0,0,0,0.6);
            transition: transform 0.1s;
            text-shadow: 1px 1px 0px #000;
            text-align: center;
        }

        .action-btn:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        /* --- WIN SCHERM --- */
        #win-layer {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding-top: 10vh;
            padding-bottom: 10vh;
            z-index: 25;
        }

        .win-title {
            font-size: clamp(5rem, 18vw, 9rem);
            text-align: center;
            color: #ffeb3b;
            text-shadow: 5px 5px 0px #d32f2f, -2px -2px 0px #000, 2px -2px 0px #000;
            letter-spacing: 5px;
            animation: bounce 2s infinite;
        }
        
        .restart-btn {
            background: #d32f2f;
            border-color: #ffeb3b;
            color: #ffeb3b;
            max-width: 300px;
            pointer-events: auto;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
            60% {transform: translateY(-7px);}
        }

    </style>
</head>
<body>

    <div id="game-screen">
        <div id="top-ui">
            <div id="signpost" style="display:none;">0/10 KM</div>
            <button id="audio-toggle" onclick="toggleAudio()">🔊 AAN</button>
        </div>

        <!-- JUMPSCARE FLASH LAYER (Zal dynamisch gevuld worden met SVGs) -->
        <div id="jumpscare-overlay"></div>

        <!-- === SCÈNES === -->
        
        <!-- Menu Achtergrond -->
        <div id="scene-menu" class="scene active">
            <svg id="fallback-menu" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" style="width: 100%; height: 100%;">
                <rect width="100" height="100" fill="#64b5f6" />
                <circle cx="80" cy="25" r="12" fill="#fff59d" />
                <polygon points="0,70 20,45 45,75 70,35 100,70 100,100 0,100" fill="#4caf50" />
                <polygon points="0,100 15,65 35,90 60,50 85,85 100,60 100,100" fill="#388e3c" />
            </svg>
        </div>

        <!-- Splitsing Achtergrond -->
        <div id="scene-fork" class="scene">
            <svg id="fallback-fork" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" style="width: 100%; height: 100%;">
                <rect width="100" height="100" fill="#2e7d32" />
                <rect x="10" y="0" width="10" height="60" fill="#5d4037" />
                <circle cx="15" cy="15" r="20" fill="#1b5e20" />
                <rect x="80" y="0" width="10" height="60" fill="#5d4037" />
                <polygon points="45,50 55,50 70,100 30,100" fill="#8d6e63" />
            </svg>
        </div>

        <!-- Game Over Achtergrond -->
        <div id="scene-gameover" class="scene">
            <svg id="fallback-gameover" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" style="width: 100%; height: 100%;">
                <rect width="100" height="100" fill="#110000" />
                <rect x="40" y="20" width="20" height="60" fill="#220000" />
                <path d="M 0 100 L 50 50 L 100 100 Z" fill="#330000" opacity="0.5" />
            </svg>
        </div>

        <!-- Water -->
        <svg id="scene-water" class="scene" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
            <rect width="100" height="100" fill="#4caf50" />
            <path d="M 30 100 Q 50 75 40 50 T 60 0 L 80 0 Q 70 25 60 50 T 80 100 Z" fill="#29b6f6" />
        </svg>

        <!-- Bosje -->
        <svg id="scene-bush" class="scene" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
            <rect width="100" height="100" fill="#388e3c" />
            <rect x="0" y="60" width="100" height="40" fill="#2e7d32" />
            <circle cx="50" cy="50" r="30" fill="#1b5e20" />
        </svg>

        <!-- Donker Bos -->
        <svg id="scene-dark" class="scene" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
            <rect width="100" height="100" fill="#0c1110" />
            <rect x="10" y="0" width="20" height="100" fill="#080c0a" />
            <rect x="70" y="0" width="25" height="100" fill="#080c0a" />
        </svg>

        <!-- Grot -->
        <svg id="scene-cave" class="scene" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
            <rect width="100" height="100" fill="#3e2723" />
            <path d="M 10 100 Q 30 10 50 10 Q 70 10 90 100 Z" fill="#000" />
        </svg>

        <!-- Overwinning: Groepsfoto / Einde.png -->
        <div id="scene-win" class="scene">
            <svg id="fallback-win" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" style="width: 100%; height: 100%;">
                <rect width="100" height="100" fill="#81c784" />
                <polygon points="0,0 100,0 100,100 0,100" fill="#ffeb3b" opacity="0.2" />
                <circle cx="50" cy="0" r="40" fill="#4caf50" opacity="0.5" />
                <rect y="60" width="100" height="40" fill="#4caf50" />
                <g id="win-group"></g>
            </svg>
        </div>

        <div id="scanlines"></div>

        <!-- SETUP LAAG (PRELOADER) -->
        <div id="setup-layer" class="layer">
            <h1 class="setup-title">De Bende - Loading</h1>
            <p id="loading-status" style="font-size: clamp(1rem, 4vw, 1.5rem);">Afbeeldingen inladen...</p>
            
            <label class="upload-label" style="margin-top:20px;">
                EIGEN FOTO KIEZEN
                <input type="file" id="bg-upload" accept="image/*">
            </label>
            <button class="action-btn" onclick="skipSetup()" style="max-width: 300px; flex: none; margin-top:10px;">START MET STANDAARD</button>
        </div>

        <!-- MENU LAAG -->
        <div id="menu-layer" class="layer">
            <h1 class="game-title">DE BENDE</h1>
            
            <div class="menu-buttons">
                <div class="press-start" onclick="initGame(5)">5 KM WANDELEN</div>
                <div class="press-start" onclick="initGame(10)">10 KM WANDELEN</div>
            </div>

            <div class="credits">
                <span>© 2026 16-BIT RETRO STUDIOS</span>
                <span style="color: #64b5f6;">ONTWIKKELAAR: TIBO SAELAERT</span>
            </div>
        </div>

        <!-- CUTSCENE LAAG -->
        <div id="cutscene-layer" class="layer" onclick="nextDialogLine()">
            <div class="cutscene-box">
                <div class="portrait-container" id="cutscene-avatar"></div>
                <div class="dialog-content">
                    <div class="speaker-name" id="cutscene-name">Naam</div>
                    <div class="speaker-text" id="cutscene-text">...</div>
                </div>
                <div class="next-indicator">▼</div>
            </div>
        </div>

        <!-- BOVENAAN: GAME OVER TITEL -->
        <h1 id="gameover-title">GAME OVER</h1>

        <!-- GAME LAAG -->
        <div id="game-layer" class="layer">
            <div id="dialog-container">
                <div class="dialog-box" id="dialog-text">
                    Je staat aan de rand van het bos. Selecteer je pad.
                </div>
                <div class="choices-container" id="choices-box">
                    <!-- Knoppen -->
                </div>
            </div>
        </div>

        <!-- WIN SCHERM LAAG -->
        <div id="win-layer" class="layer">
            <h1 class="win-title">YOU WIN!</h1>
            <button class="action-btn restart-btn" onclick="resetGame()">TERUG NAAR MENU</button>
        </div>
    </div>

    <script>
        // --- PRELOAD MULTIPLE IMAGES ---
        let imagesLoaded = 0;
        const totalImages = 4;

        const imgUrls = {
            menu: 'https://i.imgur.com/SqKgNdV.jpg',  // De startscherm foto
            fork: 'https://i.imgur.com/gE8Xoia.png',  // Splitsing afbeelding
            gameover: 'https://i.imgur.com/ZjerXTN.png', // Game Over afbeelding
            win: 'images/Einde.png'                     // Eindscherm foto uit de map images
        };

        function preloadImgur() {
            Object.keys(imgUrls).forEach(key => {
                const img = new Image();
                img.onload = () => {
                    document.getElementById(`scene-${key}`).style.backgroundImage = `url('${imgUrls[key]}')`;
                    const fallback = document.getElementById(`fallback-${key}`);
                    if (fallback) fallback.style.display = 'none';
                    checkAllLoaded();
                };
                img.onerror = () => {
                    console.warn(`Kon afbeelding ${key} niet inladen. Fallback SVG is actief.`);
                    checkAllLoaded(); 
                };
                img.src = imgUrls[key];
            });
        }

        function checkAllLoaded() {
            imagesLoaded++;
            if (imagesLoaded >= totalImages) {
                document.getElementById('loading-status').innerText = "Klaar!";
                setTimeout(showMenuLayer, 500);
            }
        }

        document.getElementById('bg-upload').addEventListener('change', function(e) {
            initAudio(); 
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('scene-menu').style.backgroundImage = `url('${event.target.result}')`;
                    document.getElementById('fallback-menu').style.display = 'none';
                    showMenuLayer();
                };
                reader.readAsDataURL(file);
            }
        });

        function skipSetup() {
            initAudio();
            showMenuLayer();
        }

        function showMenuLayer() {
            document.getElementById('setup-layer').style.display = 'none';
            document.getElementById('menu-layer').style.display = 'flex';
        }

        // --- NAMEN & AVATARS ---
        const bendeNamen = ["Tibo", "Bram", "Yaron", "Marthe", "Merel", "Ruben", "Michiel", "Lisa", "Kurt", "Anja", "Michel", "An", "Wim", "Valerie", "Patje", "Edith", "Yaël", "Stefanie"];

        function getGenericAvatar(name) {
            const colors = ['#1976d2', '#d32f2f', '#388e3c', '#7b1fa2', '#f57c00'];
            const color = colors[name.length % colors.length];
            return `
            <svg viewBox="0 0 32 32" width="100%" height="100%">
                <rect x="8" y="10" width="16" height="14" fill="#ffe0bd"/>
                <rect x="6" y="6" width="20" height="6" fill="#5d4037"/>
                <rect x="12" y="14" width="2" height="2" fill="#000"/>
                <rect x="18" y="14" width="2" height="2" fill="#000"/>
                <rect x="14" y="20" width="4" height="2" fill="#d32f2f"/>
                <rect x="6" y="24" width="20" height="8" fill="${color}"/>
            </svg>`;
        }

        const avatarWinston = `
            <svg viewBox="0 0 32 32" width="100%" height="100%">
                <rect x="8" y="10" width="16" height="14" fill="#8d6e63"/> 
                <rect x="6" y="10" width="4" height="10" fill="#5d4037"/> 
                <rect x="22" y="10" width="4" height="10" fill="#5d4037"/> 
                <rect x="12" y="14" width="2" height="2" fill="#000"/> 
                <rect x="18" y="14" width="2" height="2" fill="#000"/> 
                <rect x="14" y="20" width="4" height="2" fill="#212121"/> 
                <rect x="15" y="22" width="2" height="2" fill="#d32f2f"/> 
            </svg>`;

        // --- DYNAMISCHE CUTSCENE GENERATOR ---
        let cutsceneIndex = 0;
        let currentCutscene = [];
        let onCutsceneEnd = null;
        let isTyping = false;
        let typeTimer = null;

        function generateDialogs() {
            let n1 = bendeNamen[Math.floor(Math.random() * bendeNamen.length)];
            let n2 = bendeNamen[Math.floor(Math.random() * bendeNamen.length)];
            while (n1 === n2) n2 = bendeNamen[Math.floor(Math.random() * bendeNamen.length)];

            // Intro opties
            const introOptions = [
                [

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playNote(frequency, time, duration) {
            if (isAudioMuted || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = frequency;
            gainNode.gain.setValueAtTime(0.04, time);
            gainNode.gain.exponentialRampToValueAtTime(0.001, time + duration - 0.05);
            osc.connect(gainNode).connect(audioCtx.destination);
            osc.start(time); osc.stop(time + duration);
        }

        // Angstaanjagend 16-bit Jumpscare Geluiden (verschilt per monster)
        function playJumpscareSound(monsterType) {
            if (isAudioMuted || !audioCtx) return;
            const now = audioCtx.currentTime;
            
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            if (monsterType === 'demon') {
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(80, now);
                osc1.frequency.linearRampToValueAtTime(1400, now + 0.2);
                osc1.frequency.linearRampToValueAtTime(60, now + 1.2);
                
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(100, now);
                osc2.frequency.linearRampToValueAtTime(1500, now + 0.2);
                osc2.frequency.linearRampToValueAtTime(50, now + 1.2);
            } else if (monsterType === 'owl') {
                osc1.type = 'triangle';
                osc1.frequency.setValueAtTime(300, now);
                osc1.frequency.linearRampToValueAtTime(1800, now + 0.1);
                osc1.frequency.linearRampToValueAtTime(200, now + 1.0);
                
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(400, now);
                osc2.frequency.linearRampToValueAtTime(1600, now + 0.15);
                osc2.frequency.linearRampToValueAtTime(250, now + 1.0);
            } else { // bats
                osc1.type = 'square';
                osc1.frequency.setValueAtTime(600, now);
                osc1.frequency.linearRampToValueAtTime(2000, now + 0.05);
                osc1.frequency.linearRampToValueAtTime(1200, now + 0.4);
                osc1.frequency.linearRampToValueAtTime(2000, now + 0.8);
                
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(500, now);
                osc2.frequency.linearRampToValueAtTime(2200, now + 0.05);
                osc2.frequency.linearRampToValueAtTime(1300, now + 0.4);
                osc2.frequency.linearRampToValueAtTime(2200, now + 0.8);
            }
            
            gain.gain.setValueAtTime(0.35, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
            
            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + 1.2);
            osc2.stop(now + 1.2);
        }

        function audioLoop() {
            if (!isAudioPlaying) return;
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                const noteDuration = isScaryPhase ? 0.2 : 0.25;
                const tempo = isScaryPhase ? 0.24 : 0.3;
                playNote(melody[currentNoteIndex], nextNoteTime, noteDuration);
                nextNoteTime += tempo; 
                currentNoteIndex = (currentNoteIndex + 1) % melody.length;
            }
            requestAnimationFrame(audioLoop);
        }

                if (currentDistance === midwayPoint && !isScaryPhase) {
                    dialogText.innerText = msg;
                    choicesBox.innerHTML = `<button class="action-btn" onclick="triggerMidwayCutscene()">VERDER</button>`;
                } else if(currentDistance >= targetDistance) {
                    dialogText.innerText = msg;
                    choicesBox.innerHTML = `<button class="action-btn" style="color: #4caf50; border-color: #4caf50;" onclick="triggerOutro()">BEKIJK EINDE</button>`;
                } else {
                    dialogText.innerText = msg;
                    choicesBox.innerHTML = `<button class="action-btn" onclick="showFork()">WANDEL VERDER (+1 KM)</button>`;
                }
            } else {
                // Game over
                stopMusic();
                setScene('gameover');
                document.getElementById('gameover-title').style.display = 'block';
                
                if(!isAudioMuted && audioCtx) playNote(100, audioCtx.currentTime, 1.0);
                
                dialogText.innerText = msg;
                choicesBox.innerHTML = `<button class="action-btn" style="color: #ff5252; border-color: #ff5252;" onclick="resetGame()">OPNIEUW PROBEREN</button>`;
            }
        }

        // DE GEVARIEERDE JUMPSCARE EFFECTEN LOGGER
        function triggerJumpscare(msg, monsterType) {
            stopMusic();
            
            // Vul de jumpscare overlay met de bijbehorende monster SVG
            document.getElementById('jumpscare-overlay').innerHTML = monsterSVGs[monsterType];
            
            // Activeer jumpscare overlay en shake effect
            document.getElementById('jumpscare-overlay').classList.add('active');
            document.getElementById('game-screen').classList.add('shake');
            
            playJumpscareSound(monsterType);

            setTimeout(() => {
                // Zet overlay en shake weer uit na 1.2 seconden
                document.getElementById('jumpscare-overlay').classList.remove('active');
                document.getElementById('game-screen').classList.remove('shake');
                
                // Start de muziek weer op (enger/sneller tempo)
                startMusic();

                // Ga door met de gewone flow alsof je het overleefd hebt
                currentDistance++;
                updateSignpost();

                dialogText.innerText = msg;
                if(currentDistance >= targetDistance) {
                    choicesBox.innerHTML = `<button class="action-btn" style="color: #4caf50; border-color: #4caf50;" onclick="triggerOutro()">BEKIJK EINDE</button>`;
                } else {
                    choicesBox.innerHTML = `<button class="action-btn" onclick="showFork()">WANDEL VERDER (+1 KM)</button>`;
                }
            }, 1200);
        }

        function triggerMidwayCutscene() {
            gameLayer.style.display = 'none';
            signpost.style.display = 'none';
            
            // Start de sfeervolle midway dialoog
            playCutscene(currentMidway, () => {
                isScaryPhase = true; // Activeert de enge, moeilijkere vragen + de jumpscare
                startGameplayAfterMidway();
            });
        }

        function startGameplayAfterMidway() {
            gameLayer.style.display = 'flex';
            signpost.style.display = 'block';
            updateSignpost();
            showFork();
        }

        function triggerOutro() {
            gameLayer.style.display = 'none';
            signpost.style.display = 'none';
            playCutscene(currentOutro, victory);
        }

        function victory() {
            setScene('win');
            stopMusic();
            winLayer.style.display = 'flex';
            
            if(!isAudioMuted && audioCtx) {
                const t = audioCtx.currentTime;
                playNote(523, t, 0.15); playNote(659, t + 0.45, 0.4); playNote(659, t + 1.0, 0.6);   
            }
        }

        function resetGame() {
            stopMusic();
            setScene('menu');
            document.getElementById('gameover-title').style.display = 'none';
            signpost.style.display = 'none';
            gameLayer.style.display = 'none';
            winLayer.style.display = 'none';
            document.getElementById('menu-layer').style.display = 'flex';
        }

    </script>
</body>
</html>
